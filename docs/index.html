<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>日本株購入検討 - 銘柄入力</title>
  <link rel="stylesheet" href="./styles.css" />
  <!-- Fuse.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">株</div>
      <span class="topbar-title">JP Stock Analyzer</span>
    </div>
    <span class="topbar-tag">Beta</span>
  </div>

  <div class="container">

    <!-- HERO -->
    <header class="hero">
      <h1>日本株 <span class="accent">購入検討ツール</span></h1>
      <p class="sub">銘柄名または証券コードを入力してください。ゆるい入力でも候補を自動補正します。</p>
    </header>

    <!-- 銘柄入力 -->
    <section class="card">
      <div class="card-header">
        <div class="card-icon">🔍</div>
        <span class="card-title">銘柄検索</span>
      </div>

      <label for="tickerInput" class="label">銘柄（名称 / コード）</label>
      <div class="row">
        <input id="tickerInput" class="input" type="text"
          placeholder="例：三菱重 / 7011 / トヨタ" autocomplete="off" />
        <button id="btnResolve" class="btn secondary" type="button">候補検索</button>
        <button id="btnAnalyze" class="btn primary" type="button">送信</button>
      </div>

      <div class="row2">
        <div class="field">
          <label for="asOf" class="label small">評価日（任意）</label>
          <input id="asOf" class="input small" type="date" />
        </div>
        <div class="field">
          <label for="mode" class="label small">モード（任意）</label>
          <select id="mode" class="input small">
            <option value="B" selected>B（標準）</option>
            <option value="A">A（詳細）</option>
            <option value="C">C（簡易）</option>
          </select>
        </div>
      </div>

      <div class="dict-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="dictStatus">銘柄辞書: 読み込み中…</span>
      </div>
    </section>

    <!-- 候補 -->
    <section class="card">
      <div class="card-header">
        <div class="card-icon">📋</div>
        <span class="card-title">候補一覧</span>
      </div>
      <p class="sub">入力に近い候補を表示します。候補をクリックすると確定します。</p>
      <div id="candidates" class="candidates"></div>
      <div class="resolved">
        <div class="resolved-bar">
          <span class="badge">確定</span>
          <span id="resolvedText">未選択</span>
        </div>
      </div>
    </section>

    <!-- 分析結果 -->
    <section class="card">
      <div class="card-header">
        <div class="card-icon">📈</div>
        <span class="card-title">分析結果</span>
      </div>
      <p class="sub">選択した銘柄を評価します。評価には15秒程度かかります。</p>
      <div id="result" class="result">(まだ結果はありません)</div>
    </section>

    <!-- CONTACT & FOOTER -->
    <div class="contact-wrap">
      <a href="https://ig.me/m/chochoporice" class="contact-link">📩 お問い合わせはこちら</a>
    </div>
    <footer class="footer">© 2025 Toshiyuki Oosawa — 無断複製・商用利用禁止</footer>

  </div>

  <!-- ステータスドット制御 -->
  <script>
    const _dot = document.getElementById("statusDot");
    const _st  = document.getElementById("dictStatus");
    new MutationObserver(() => {
      const t = _st.textContent;
      _dot.className = t.includes("完了") ? "status-dot ok"
                     : t.includes("失敗") ? "status-dot err"
                     : "status-dot";
    }).observe(_st, { childList: true, characterData: true, subtree: true });
  </script>
  <script src="./app.js"></script>
</body>
</html>
