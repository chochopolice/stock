<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>日本株購入検討ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>

  <!-- トップバー -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="icon">📈</div>
      日本株購入検討ツール
      <span class="topbar-badge">Beta</span>
    </div>
    <div class="topbar-dict">
      <span class="status-dot" id="statusDot"></span>
      <span id="dictStatus">銘柄辞書: 読み込み中…</span>
    </div>
  </div>

  <div class="container">

    <!-- 銘柄入力 -->
    <div class="card">
      <div class="card-title">銘柄検索</div>
      <div class="input-wrap">
        <input id="tickerInput" class="input" type="text"
          placeholder="例：三菱重 / 7011 / トヨタ" autocomplete="off" />
        <button id="btnResolve" class="btn btn-secondary" type="button">候補検索</button>
      </div>
      <div class="meta-row">
        <div class="meta-field">
          <span class="field-label">評価日（任意）</span>
          <input id="asOf" class="input" type="date" />
        </div>
      </div>
    </div>

    <!-- 候補 -->
    <div class="card">
      <div class="card-title">候補一覧</div>
      <p class="card-sub">入力に近い候補を表示します。候補をクリックして確定してください。</p>
      <div id="candidates" class="candidates"></div>
      <div class="resolved-bar">
        <span class="badge">確定</span>
        <span id="resolvedText">未選択</span>
      </div>
      <button id="btnAnalyze" class="btn-submit" type="button">📊 分析を実行する</button>
    </div>

    <!-- 分析結果 -->
    <div class="card">
      <div class="card-title">分析結果</div>
      <p class="card-sub">選択した銘柄を評価します。評価には15秒程度かかります。</p>
      <div class="result-area">
        <div id="result">(まだ結果はありません)</div>
      </div>
    </div>

  </div>

  <!-- お問い合わせ -->
  <div class="contact-wrap">
    <a href="https://ig.me/m/chochoporice" class="contact-link">📩 お問い合わせはこちら</a>
  </div>
  <footer class="footer">© 2025 Toshiyuki Oosawa — 無断複製・商用利用禁止</footer>

  <!-- ステータスドット制御 -->
  <script>
    const _dot = document.getElementById("statusDot");
    const _st  = document.getElementById("dictStatus");
    new MutationObserver(() => {
      const t = _st.textContent;
      _dot.className = t.includes("完了") ? "status-dot ok"
                     : t.includes("失敗") ? "status-dot err"
                     : "status-dot";
    }).observe(_st, { childList: true, characterData: true, subtree: true });
  </script>
  <script src="./app.js"></script>
</body>
</html>
